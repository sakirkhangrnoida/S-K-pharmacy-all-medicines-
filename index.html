window.toast = function(msg){
  try {
    let text = '';
    
    if(msg == null) return;
    if(typeof msg === 'string') text = msg;
    else if(typeof msg === 'number' || typeof msg === 'boolean') text = msg + '';
    else if(typeof msg === 'object') {
      text = msg.message || msg.error || msg.code || JSON.stringify(msg);
    }
    else text = String(msg);
    
    // Safety check
    if(!text || text === '[object Object]' || text === 'undefined') return;
    
    let t = document.getElementById('toast');
    if(t) {
      t.innerText = text;
      t.style.display = 'block';
      setTimeout(()=>{ if(t) t.style.display='none' }, 3000);
    }
  } catch(e) {
    console.log(e); // Toast में Error भी नहीं दिखेगा
  }
}
// ===== BULLETPROOF TOAST END =====

// ===== Read More Functions =====
function expandContent(id){
  document.getElementById(id+'-short').style.display = 'none';
  document.getElementById(id+'-full').style.display = 'block';
}
function collapseContent(id){
  document.getElementById(id+'-full').style.display = 'none';
  document.getElementById(id+'-short').style.display = 'block';
}

function loadLiveOrders(){
  db.ref('orders').limitToLast(50).on('value', snap => {
    let html = '';
    snap.forEach(child => {
      let o = child.val();
      html += `<div style="border:1px solid #ddd; padding:12px; margin:8px 0"><b>${o.orderId}</b> - ${o.status}<br>${o.product || 'Product'} | ₹${o.price || 0}</div>`;
    });
    document.getElementById('liveOrderList').innerHTML = html || 'कोई Order नहीं';
  });
}

function showAuthBox(){
  let user = auth.currentUser;
  if(user){
    document.getElementById('authBox').innerHTML = `<p>Welcome ${user.email}</p><button class="primary" onclick="logout()">Logout</button>`;
  } else {
    document.getElementById('authBox').innerHTML = `<input id="email" placeholder="Email" class="input"><input id="pass" type="password" placeholder="Password" class="input"><button class="primary" onclick="login()">Login</button><button class="secondary" onclick="signup()">Signup</button>`;
  }
}

function showMyAccount(){
  let user = auth.currentUser;
  if(user){
    document.getElementById('myAccountBox').innerHTML = `<h3>My Orders</h3><p>User: ${user.email}</p><p>Order History यहाँ दिखेगी</p>`;
  } else {
    document.getElementById('myAccountBox').innerHTML = 'पहले Login करो';
  }
}

function signup(){
  let e = document.getElementById('email').value, p = document.getElementById('pass').value;
  if(!e ||!p) return toast('Email और Password डालो');
  auth.createUserWithEmailAndPassword(e,p).then(() => {toast('Signup हो गया'); showAuthBox()}).catch(err => toast(err.message));
}

function login(){
  let e = document.getElementById('email').value, p = document.getElementById('pass').value;
  if(!e ||!p) return toast('Email और Password डालो');
  
  auth.signInWithEmailAndPassword(e,p).then(() => {toast('Login हो गया'); showAuthBox()}).catch(err => toast(err));
}
  function logout(){
  auth.signOut().then(() => {toast('Logout हो गया'); showAuthBox()});
}

function showCart(){
  let html = '<div><span class="close" onclick="closePopup(\'settingsPopup\')">×</span><h2>🛒 Your Cart</h2>';
  if(cart.length == 0){
    html += '<p style="text-align:center; padding:30px">Cart खाली है</p>';
  } else {
    let total = 0;
    cart.forEach(id => {
      let p = allProducts[id];
      if(p){
        total += p.price;
        html += `<div style="border-bottom:1px solid #ddd; padding:10px">${p.name} - ₹${p.price}</div>`;
      }
    });
    html += `<h3 style="margin-top:15px">Total: ₹${total}</h3>`;
     html += '<button class="primary" onclick="toast(\'Checkout Page नहीं आएगा.\')">Checkout</button>';
  }
  html += '</div>';
  document.getElementById('settingsPopup').innerHTML = html;
  document.getElementById('settingsPopup').style.display = 'flex';
}

function searchProd(){
  let q = document.getElementById('search').value.toLowerCase();
  let filtered = {};
  for(let id in allProducts){
    if(allProducts[id].name.toLowerCase().includes(q) || (allProducts[id].cat && allProducts[id].cat.toLowerCase().includes(q)))
      filtered[id] = allProducts[id];
  }
  let temp = allProducts;
  allProducts = filtered;
  renderProducts();
  allProducts = temp;
}

function closePopup(id){
  document.getElementById(id).style.display = 'none';
}

// ===== BULLETPROOF TOAST - अब Object कभी नहीं आएगा =====
window.toast = function(msg){
  try {
    let text = '';
    
    if(msg == null) return;
    if(typeof msg === 'string') text = msg;
    else if(typeof msg === 'number' || typeof msg === 'boolean') text = msg + '';
    else if(typeof msg === 'object') {
      text = msg.message || msg.error || msg.code || JSON.stringify(msg);
    }
    else text = String(msg);
    
    // Safety check
    if(!text || text === '[object Object]' || text === 'undefined') return;
    
    let t = document.getElementById('toast');
    if(t) {
      t.innerText = text;
      t.style.display = 'block';
      setTimeout(()=>{ if(t) t.style.display='none' }, 3000);
    }
  } catch(e) {
    console.log(e); // Toast में Error भी नहीं दिखेगा
  }
}

let urlParams = new URLSearchParams(window.location.search);
if(urlParams.get('p')) setTimeout(() => openProduct(urlParams.get('p')), 1000);
