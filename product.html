<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>S K Pharmacy - Greater Noida 203201</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<!-- Header, Ticker app.js Auto बनाएगा -->

<div class="container">
  <div class="products" id="productList">
    
    <!-- Product 1 Card -->
    <div class="product">
      <a href="product1.html">  <!-- ये Link product.html पे जाएगा -->
        <img src="dettol.jpg" alt="Dettol Soap">
        <h4>Dettol Soap 100g</h4>
      </a>
      <div class="price">₹45</div>
      <div class="btns">
        <button class="btn-cart" onclick="window.location='product1.html'">Add to Cart</button>
        <button class="btn-buy" onclick="window.location='product1.html'">Buy Now</button>
      </div>
    </div>

    <!-- Product 2 Card -->
    <div class="product">
      <a href="product2.html">
        <img src="savlon.jpg" alt="Savlon">
        <h4>Savlon Antiseptic 500ml</h4>
      </a>
      <div class="price">₹120</div>
      <div class="btns">
        <button class="btn-cart" onclick="window.location='product2.html'">Add to Cart</button>
        <button class="btn-buy" onclick="window.location='product2.html'">Buy Now</button>
      </div>
    </div>

    <!-- ऐसे 1000 Product जोड़ दे -->
    
  </div>
</div>

<!-- OTP + Admin Popup -->
<div class="otp-popup hide" id="otpPopup">...</div>
<div class="otp-popup hide" id="adminPanel">...</div>

<script type="module" src="app.js"></script>
</body>
</html>
